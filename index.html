<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schoggigipfeli Ranking No.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdf8f3;
        }
        .rating-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e5e7eb;
            outline: none;
        }
        .rating-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #78350f;
            cursor: pointer;
            transition: background .15s ease-in-out;
        }
        .rating-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #78350f;
            cursor: pointer;
        }
        .card {
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-stone-800">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-amber-900 mb-2">Schoggigipfeli Ranking No.1</h1>
            <p class="text-sm uppercase tracking-widest text-amber-700 font-semibold">
                Studie 12/2025: Quantitative und qualitative Analyse im Alltag
            </p>
        </header>

        <!-- Input Form -->
        <section class="bg-white rounded-3xl shadow-xl p-6 mb-10 border border-amber-100">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                🥐 Neue Analyse erfassen
            </h2>
            
            <div class="space-y-6">
                <!-- Metadata -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-1">Objekt</label>
                        <input type="text" id="objekt" placeholder="z.B. Butter-Schoggigipfeli" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-1">Kaufort</label>
                        <input type="text" id="kaufort" placeholder="z.B. Coop, Bäcker XY..." class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                </div>

                <hr class="border-stone-100">

                <!-- Rating Criteria -->
                <div class="space-y-8">
                    <!-- FGI -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-semibold text-amber-900">Fgi <span class="text-xs font-normal text-stone-500">(Fülligs gnuss index - 1.5x)</span></label>
                            <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold" id="val-fgi">5</span>
                        </div>
                        <input type="range" id="fgi" min="1" max="10" value="5" class="rating-slider" oninput="updateVal('fgi')">
                        <textarea id="comm-fgi" placeholder="Kommentar zur Füllung..." class="mt-2 w-full p-2 text-sm border rounded-lg h-16 outline-none focus:border-amber-400"></textarea>
                    </div>

                    <!-- TGK -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-semibold text-amber-900">Tgk <span class="text-xs font-normal text-stone-500">(Teig geilheits koeffiziänt - 1.0x)</span></label>
                            <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold" id="val-tgk">5</span>
                        </div>
                        <input type="range" id="tgk" min="1" max="10" value="5" class="rating-slider" oninput="updateVal('tgk')">
                        <textarea id="comm-tgk" placeholder="Kommentar zum Teig..." class="mt-2 w-full p-2 text-sm border rounded-lg h-16 outline-none focus:border-amber-400"></textarea>
                    </div>

                    <!-- KVE -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-semibold text-amber-900">Kve <span class="text-xs font-normal text-stone-500">(Kafi verträglechkeis Einstufung - 0.5x)</span></label>
                            <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold" id="val-kve">5</span>
                        </div>
                        <input type="range" id="kve" min="1" max="10" value="5" class="rating-slider" oninput="updateVal('kve')">
                        <textarea id="comm-kve" placeholder="Wie passt er zum Kaffee?" class="mt-2 w-full p-2 text-sm border rounded-lg h-16 outline-none focus:border-amber-400"></textarea>
                    </div>

                    <!-- OI -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-semibold text-amber-900">OI <span class="text-xs font-normal text-stone-500">(Optische impact - 1.0x)</span></label>
                            <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold" id="val-oi">5</span>
                        </div>
                        <input type="range" id="oi" min="1" max="10" value="5" class="rating-slider" oninput="updateVal('oi')">
                        <textarea id="comm-oi" placeholder="Optischer Eindruck..." class="mt-2 w-full p-2 text-sm border rounded-lg h-16 outline-none focus:border-amber-400"></textarea>
                    </div>
                </div>

                <button onclick="addRanking()" class="w-full bg-amber-800 hover:bg-amber-900 text-white font-bold py-4 rounded-2xl shadow-lg transition-colors flex items-center justify-center gap-2">
                    Analyse speichern & auswerten
                </button>
            </div>
        </section>

        <!-- Results Section -->
        <section id="results-container" class="space-y-6">
            <h2 class="text-2xl font-bold text-amber-900 flex items-center gap-2">
                📊 Aktuelle Rangliste
            </h2>
            <div id="rankings-list" class="space-y-4">
                <!-- Dynamically populated -->
                <p class="text-stone-400 italic text-center py-10">Noch keine Analysen vorhanden.</p>
            </div>
        </section>
    </div>

    <!-- Notification system -->
    <div id="toast" class="fixed bottom-5 right-5 bg-stone-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-20 transition-transform duration-300 pointer-events-none">
        Ranking hinzugefügt!
    </div>

    <script>
        let rankings = [];

        function updateVal(id) {
            document.getElementById('val-' + id).innerText = document.getElementById(id).value;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('translate-y-20');
            setTimeout(() => t.classList.add('translate-y-20'), 3000);
        }

        function calculateScore(fgi, tgk, kve, oi) {
            // Weights: Fgi 1.5, Tgk 1, Kve 0.5, OI 1
            // Max potential: (10*1.5) + (10*1) + (10*0.5) + (10*1) = 15 + 10 + 5 + 10 = 40
            const score = (fgi * 1.5) + (tgk * 1.0) + (kve * 0.5) + (oi * 1.0);
            return score.toFixed(1);
        }

        function addRanking() {
            const objekt = document.getElementById('objekt').value.trim();
            const kaufort = document.getElementById('kaufort').value.trim();
            
            if (!objekt || !kaufort) {
                showToast("Bitte Objekt und Kaufort angeben!");
                return;
            }

            const data = {
                id: Date.now(),
                objekt,
                kaufort,
                date: new Date().toLocaleDateString('de-CH'),
                fgi: parseInt(document.getElementById('fgi').value),
                tgk: parseInt(document.getElementById('tgk').value),
                kve: parseInt(document.getElementById('kve').value),
                oi: parseInt(document.getElementById('oi').value),
                commFgi: document.getElementById('comm-fgi').value,
                commTgk: document.getElementById('comm-tgk').value,
                commKve: document.getElementById('comm-kve').value,
                commOi: document.getElementById('comm-oi').value,
            };

            data.totalScore = calculateScore(data.fgi, data.tgk, data.kve, data.oi);
            
            rankings.unshift(data);
            renderRankings();
            resetForm();
            showToast("Analyse abgeschlossen!");
        }

        function resetForm() {
            document.getElementById('objekt').value = '';
            document.getElementById('kaufort').value = '';
            ['fgi', 'tgk', 'kve', 'oi'].forEach(id => {
                document.getElementById(id).value = 5;
                updateVal(id);
                document.getElementById('comm-' + id).value = '';
            });
        }

        function renderRankings() {
            const list = document.getElementById('rankings-list');
            if (rankings.length === 0) {
                list.innerHTML = '<p class="text-stone-400 italic text-center py-10">Noch keine Analysen vorhanden.</p>';
                return;
            }

            // Sort by total score descending
            rankings.sort((a, b) => b.totalScore - a.totalScore);

            list.innerHTML = rankings.map((r, index) => `
                <div class="card bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-sm">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-xs font-bold text-amber-700 uppercase tracking-tighter">Rang #${index + 1}</span>
                                <h3 class="text-xl font-bold text-stone-900">${r.objekt}</h3>
                                <p class="text-sm text-stone-500">${r.kaufort} • <span class="opacity-75">${r.date}</span></p>
                            </div>
                            <div class="text-right">
                                <div class="text-3xl font-black text-amber-800">${r.totalScore}<span class="text-sm font-normal text-stone-400">/40</span></div>
                                <div class="text-[10px] text-stone-400 uppercase font-bold tracking-widest">Gipfeli-Score</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4">
                            <div class="bg-stone-50 p-2 rounded-lg text-center">
                                <div class="text-[10px] text-stone-500 uppercase font-bold">Fgi</div>
                                <div class="font-bold text-stone-800">${r.fgi}/10</div>
                            </div>
                            <div class="bg-stone-50 p-2 rounded-lg text-center">
                                <div class="text-[10px] text-stone-500 uppercase font-bold">Tgk</div>
                                <div class="font-bold text-stone-800">${r.tgk}/10</div>
                            </div>
                            <div class="bg-stone-50 p-2 rounded-lg text-center">
                                <div class="text-[10px] text-stone-500 uppercase font-bold">Kve</div>
                                <div class="font-bold text-stone-800">${r.kve}/10</div>
                            </div>
                            <div class="bg-stone-50 p-2 rounded-lg text-center">
                                <div class="text-[10px] text-stone-500 uppercase font-bold">OI</div>
                                <div class="font-bold text-stone-800">${r.oi}/10</div>
                            </div>
                        </div>

                        <div class="space-y-2 border-t pt-4">
                            <p class="text-xs text-stone-600 italic">"${r.commFgi || 'Kein Kommentar zur Füllung.'}"</p>
                            <p class="text-[10px] text-stone-400 uppercase font-bold tracking-widest text-center">— Zusammenfassung —</p>
                            <div class="text-sm text-stone-700 bg-amber-50 p-3 rounded-xl">
                                <strong>Qualitatives Urteil:</strong> 
                                ${generateSummaryText(r)}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function generateSummaryText(r) {
            const score = parseFloat(r.totalScore);
            let feedback = "";
            if (score > 35) feedback = "Eine Offenbarung. Dieses Gipfeli setzt neue Massstäbe in der Schoggigipfeli-Historie.";
            else if (score > 30) feedback = "Sehr solide Leistung. Ein treuer Begleiter für jeden Kafi-Plausch.";
            else if (score > 20) feedback = "Mittelfeld. Essbar, aber ohne bleibenden Eindruck zu hinterlassen.";
            else feedback = "Enttäuschend. Die Studie empfiehlt eine Neubeurteilung des Kauforts.";

            return `${feedback} Besonders hervorzuheben ist die Bewertung von ${r.oi}/10 beim optischen Impact.`;
        }
    </script>
</body>
</html>
